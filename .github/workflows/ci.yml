name: QA Automation Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ui-tests:
    name: Testes de UI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Executar testes de UI
        run: npx cypress run --spec 'cypress/e2e/ui/**/*.cy.js'

      - name: Gerar relatório
        if: always()
        run: npm run report

      - name: Upload relatório de UI
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-report
          path: cypress/reports/html/
          retention-days: 30

      - name: Upload screenshots (se houver falha)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-screenshots
          path: cypress/screenshots/
          retention-days: 15

  performance-tests:
    name: Testes de Performance
    runs-on: ubuntu-latest
    needs: [ui-tests]
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D68
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Criar diretório de resultados
        run: mkdir -p performance/results

      - name: Executar testes de performance
        run: k6 run performance/load-test.js
        env:
          REQRES_API_KEY: ${{ secrets.REQRES_API_KEY }}

      - name: Upload resultado de performance
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-results
          path: performance/results/
          retention-days: 30